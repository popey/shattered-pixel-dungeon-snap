name: shattered-pixel-dungeon
version: 'v3.3.8'
summary: LibGDX port of the awesome Pixel Dungeon
description: |
  Shattered Pixel Dungeon is a Roguelike RPG, with pixel art graphics and lots
  of variety and replayability. Every game is unique, with four different
  playable characters, randomized levels and enemies, and over 150 items to
  collect and use. The game is simple to get into, but has lots of depth.
  Strategy is required if you want to win!
base: core22
compression: lzo

grade: stable
confinement: strict

architectures:
  - build-on: amd64
  - build-on: arm64

layout:
  /usr/lib/$CRAFT_ARCH_TRIPLET/alsa-lib:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/alsa-lib

apps:
  shattered-pixel-dungeon:
    extensions: [ gnome ]
    command: "bin/launch"
    environment:
      ALSA_CONFIG_PATH: "$SNAP/etc/asound.conf"
    plugs:
      - joystick
      - audio-playback
      - audio-record
      - alsa
      - network
      - network-bind
      - home
      - removable-media

parts:
  launcher:
    plugin: dump
    source: snap/local
  alsa-pulseaudio:
    plugin: dump
    source: .
    override-pull: |
      mkdir etc -p
      cat > etc/asound.conf <<EOF
      pcm.!default {
          type pulse
          fallback "sysdefault"
          hint {
              show on
              description "Default ALSA Output (currently PulseAudio Sound Server)"
          }
      }
      ctl.!default {
          type pulse
          fallback "sysdefault"
      }
      EOF
  shattered-pixel-dungeon:
    after: [alsa-pulseaudio,launcher]
    build-packages:
      - wget
      - ca-certificates
      - ca-certificates-java
    stage-packages:
      - openjdk-21-jre-headless
    plugin: nil
    override-build: |
      mkdir -p "$SNAPCRAFT_PART_INSTALL/bin"
      wget -O "$SNAPCRAFT_PART_INSTALL/bin/Shattered_Pixel_Dungeon.jar" "https://github.com/00-Evan/shattered-pixel-dungeon/releases/download/$SNAPCRAFT_PROJECT_VERSION/ShatteredPD-$SNAPCRAFT_PROJECT_VERSION-Java.jar"
    override-prime: |
      craftctl default
      # openjdk ships cacerts and blacklisted.certs as symlinks pointing into
      # /etc outside the snap, which the store linter rejects. ca-certificates-java
      # is a post-install hook package so its files live on the host, not in the
      # prime tree. Find all such external symlinks and replace them with real
      # copies sourced directly from the host filesystem.
      find usr/lib/jvm -name "cacerts" -o -name "blacklisted.certs" | while read link; do
        if [ -L "$link" ]; then
          target=$(readlink -f "$link")
          if [ -f "$target" ]; then
            rm "$link"
            cp "$target" "$link"
          fi
        fi
      done
